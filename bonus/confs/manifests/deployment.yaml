# Deployment for wil-playground application
# This file lives in the GitLab repository and is watched by Argo CD.
# To update the app version: change v1 → v2, commit, and push.
# Argo CD will detect the change and automatically redeploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil-playground
  template:
    metadata:
      labels:
        app: wil-playground
    spec:
      containers:
      - name: wil-playground
        image: wil42/playground:v1
        ports:
        - containerPort: 8888