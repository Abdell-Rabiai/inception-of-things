# GitLab Helm Chart — Minimal values for K3d bonus
#
# WHY THESE SETTINGS:
# GitLab is designed to run in production clusters with 16+ GB RAM.
# We're running it in a 8GB RAM Droplet alongside Argo CD and the app.
# So we strip it down to the bare essentials:
#   KEEP:    webservice, gitaly, sidekiq, shell, postgresql, redis, minio
#   DISABLE: everything else (runner, registry, monitoring, certmanager, etc.)
#
# WHAT EACH DISABLED COMPONENT DOES (so you know what you're skipping):
#   certmanager:   automates HTTPS certificates — not needed internally
#   nginx-ingress: load balancer — K3d's Traefik handles this
#   prometheus:    monitoring/metrics — not needed for this exercise
#   gitlab-runner: executes CI/CD pipelines — we only need Git hosting
#   registry:      Docker container registry — we use Docker Hub
#   kas:           Kubernetes Agent — for connecting external clusters

global:
  hosts:
    domain: gitlab.local
    externalIP: 127.0.0.1
    https: false
  ingress:
    enabled: false
    configureCertmanager: false
  kas:
    enabled: false
  appConfig:
    enableUsagePing: false
  edition: ce                    # Community Edition (free, open-source)

# Disable non-essential sub-charts
# IMPORTANT: installCertmanager is a TOP-LEVEL key, not certmanager.install
# The certmanager sub-chart schema doesn't accept 'install' as a property.
installCertmanager: false
nginx-ingress:
  enabled: false
prometheus:
  install: false
gitlab-runner:
  install: false
registry:
  enabled: false

# GitLab core services — minimal replicas and resources
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        memory: 1Gi
        cpu: 200m
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        memory: 500Mi
        cpu: 100m
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
  gitaly:
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
    persistence:
      size: 2Gi

# Database and cache — small persistent volumes
postgresql:
  primary:
    persistence:
      size: 2Gi
redis:
  master:
    persistence:
      size: 1Gi

# MinIO: object storage for GitLab uploads/artifacts
minio:
  persistence:
    size: 2Gi