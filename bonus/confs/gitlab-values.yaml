# GitLab Helm Chart — Minimal values for K3d bonus
# Pinned to chart v9.x which still supports bundled PostgreSQL and Redis

global:
  hosts:
    domain: gitlab.local
    externalIP: 127.0.0.1
    https: false
  ingress:
    enabled: false
    configureCertmanager: false
  kas:
    enabled: false
  appConfig:
    enableUsagePing: false
  edition: ce

certmanager-issuer:
  email: root@gitlab.local

installCertmanager: false
nginx-ingress:
  enabled: false
prometheus:
  install: false
gitlab-runner:
  install: false
registry:
  enabled: false

gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        memory: 1Gi
        cpu: 200m
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        memory: 500Mi
        cpu: 100m
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
  gitaly:
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
    persistence:
      size: 2Gi

postgresql:
  primary:
    persistence:
      size: 2Gi

redis:
  master:
    persistence:
      size: 1Gi

minio:
  persistence:
    size: 2Gi
